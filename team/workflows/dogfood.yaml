id: dogfood
name: "Dogfood Development"
description: "Implement → human review → done. Standard flow for developing Autopilot itself."
steps:
  - id: implement
    type: agent
    agent_id: dev
    instructions: >
      Implement the task. Read the task description carefully.
      Write clean, tested code. Run relevant tests before completing.
      Follow existing patterns in the codebase.

  - id: review
    type: human_approval

  - id: done
    type: done
