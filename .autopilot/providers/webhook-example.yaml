id: webhook-example
name: Webhook Notifications (Example)
kind: notification_channel
handler: handlers/webhook-notify.ts
description: >
  Example webhook notification provider.
  Posts JSON payloads to a configured webhook URL on actionable events.
capabilities:
  - op: notify.send
events:
  - types: [run_completed]
    statuses: [failed]
  - types: [task_changed]
    statuses: [blocked, needs_approval]
config: {}
secret_refs:
  - name: webhook_url
    source: env
    key: AUTOPILOT_WEBHOOK_URL
    description: URL to POST notification payloads to
