services:
  orchestrator:
    image: questpie/autopilot:latest
    # build:        # Uncomment to build from source
    #   context: .
    #   target: runtime
    ports:
      - "${PORT:-7778}:7778"
      - "${WEBHOOK_PORT:-7777}:7777"
      - "${DASHBOARD_PORT:-3000}:3000"
    volumes:
      - ${COMPANY_ROOT:-./company}:/data/company
    environment:
      - COMPANY_ROOT=/data/company
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - AUTOPILOT_MASTER_KEY=${AUTOPILOT_MASTER_KEY:-}
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY:-}
      - CORS_ORIGIN=${CORS_ORIGIN:-}
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:7778/api/status').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Auto-update profile — enable with: docker compose --profile auto-update up
  watchtower:
    image: containrrr/watchtower
    profiles: ["auto-update"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=300
    restart: unless-stopped

  # Dev mode — enable with: docker compose --profile dev up
  orchestrator-dev:
    build:
      context: .
      target: deps
    profiles: ["dev"]
    ports:
      - "${PORT:-7778}:7778"
      - "${WEBHOOK_PORT:-7777}:7777"
      - "${DASHBOARD_PORT:-3000}:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - ${COMPANY_ROOT:-./company}:/data/company
    environment:
      - COMPANY_ROOT=/data/company
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - AUTOPILOT_MASTER_KEY=${AUTOPILOT_MASTER_KEY:-}
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY:-}
      - NODE_ENV=development
    command: ["bun", "run", "dev"]
