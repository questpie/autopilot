services:
  autopilot:
    build: .
    ports:
      - "7778:7778"
      - "7777:7777"
    volumes:
      - ./company:/data/company
    environment:
      - COMPANY_ROOT=/data/company
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AUTOPILOT_MASTER_KEY=${AUTOPILOT_MASTER_KEY:-}
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:7778/api/status').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
