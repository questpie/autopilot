# =============================================================================
# QUESTPIE Autopilot — VPS / Production Deploy
# =============================================================================
#
# Orchestrator-only. Workers connect from other machines.
# Operator surfaces: CLI, API, MCP, Telegram, query.
#
# Usage:
#   cp .env.example .env   # set OPENROUTER_API_KEY (and DOMAIN if using Caddy)
#   docker compose up -d
#
# API:      http://SERVER_IP:7778
# Webhooks: http://SERVER_IP:7777
#
# Workers:
#   autopilot worker start --url http://SERVER_IP:7778 --token <join-token>
#
# For TLS, use the optional reverse-proxy profile:
#   docker compose --profile reverse-proxy up -d

services:
  # ── Orchestrator (always runs) ───────────────────────────────────────────
  orchestrator:
    image: questpie/autopilot:latest
    restart: unless-stopped
    ports:
      - "${PORT:-7778}:7778"
      - "${WEBHOOK_PORT:-7777}:7777"
    volumes:
      - ${COMPANY_ROOT:-./company}:/data/company
    environment:
      COMPANY_ROOT: /data/company
      NODE_ENV: production
      ORCHESTRATOR_URL: ${ORCHESTRATOR_URL:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY:-}
      AUTOPILOT_MASTER_KEY: ${AUTOPILOT_MASTER_KEY:-}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-}
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:7778/api/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ── Optional: Caddy reverse proxy + TLS ──────────────────────────────────
  # Enable with: docker compose --profile reverse-proxy up -d
  # Requires DOMAIN set in .env. Caddy auto-provisions TLS via Let's Encrypt.
  # When using Caddy, set ORCHESTRATOR_URL=https://$DOMAIN and
  # CORS_ORIGIN=https://$DOMAIN in .env.
  caddy:
    image: caddy:2-alpine
    profiles: ["reverse-proxy"]
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-}

  # ── Optional: auto-update ────────────────────────────────────────────────
  watchtower:
    image: containrrr/watchtower
    profiles: ["auto-update"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: "300"
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
