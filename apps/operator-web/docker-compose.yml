services:
  postgres:
    image: postgres:17
    container_name: operator-web-postgres
    environment:
      POSTGRES_DB: questpie_autopilot_v2
      POSTGRES_USER: questpie_autopilot_v2
      POSTGRES_PASSWORD: gkDJA7ZbkM7Ug0eRqZgP14aX
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-extensions.sql:/docker-entrypoint-initdb.d/init-extensions.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U questpie_autopilot_v2"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
