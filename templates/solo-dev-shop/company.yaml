name: "My Company"
slug: "my-company"
description: "A solo developer shop powered by QUESTPIE Autopilot"
timezone: "UTC"
language: "en"
languages: ["en"]

owner:
  name: "Founder"
  email: "founder@example.com"
  notification_channels: []

settings:
  auto_assign: true
  require_approval: ["merge", "deploy", "spend", "publish"]
  max_concurrent_agents: 4
  agent_provider: "claude-agent-sdk"
  agent_model: "claude-sonnet-4-6"
  budget:
    daily_token_limit: 2000000
    alert_at: 80
  auth:
    enabled: false             # Set to true to require authentication
    # cors_origin: "https://dashboard.example.com"  # Restrict CORS (default: '*')
  embeddings:
    provider: none            # 'gemini' | 'multilingual-e5' | 'nomic' | 'none'
    # fallback: multilingual-e5  # local fallback when primary unavailable
    dimensions: 768

integrations: {}
