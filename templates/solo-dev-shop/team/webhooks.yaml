webhooks:
  - id: telegram
    path: "/hooks/telegram"
    agent: ceo
    description: "Telegram bot webhook — receives messages and routes to agents"
    auth: none  # Telegram sends its own verification
    action:
      type: spawn_agent
      priority: normal
    enabled: false  # Enable after setting up bot token via: autopilot secrets add telegram --value "YOUR_TOKEN"

  # Example: GitHub webhook with default signature header (x-hub-signature-256)
  # - id: github
  #   path: "/hooks/github"
  #   agent: dev
  #   description: "GitHub push/PR events"
  #   auth: hmac_sha256
  #   secret_ref: github-webhook
