id: incident
name: "Incident Response Workflow"
version: 1
description: "Rapid incident response workflow with accelerated review and deployment"

steps:
  - id: triage
    name: "Triage"
    type: agent
    assigned_role: devops
    description: "Assess incident severity, identify affected systems, gather initial diagnostics"
    expected_duration: "5m"
    timeout: "15m"
    timeout_action: alert_human
    transitions:
      done: investigate

  - id: investigate
    name: "Investigate"
    type: agent
    assigned_role: devops
    description: "Deep dive into logs, metrics, and traces to identify root cause"
    inputs:
      - from_step: triage
        type: document
    expected_duration: "15m"
    timeout: "30m"
    timeout_action: alert_human
    transitions:
      done: hotfix

  - id: hotfix
    name: "Hotfix"
    type: agent
    assigned_role: developer
    description: "Implement minimal fix to resolve the incident"
    inputs:
      - from_step: investigate
        type: document
    outputs:
      - type: branch
        name_template: "hotfix/{{task_id}}"
        description: "Hotfix branch"
    expected_duration: "30m"
    timeout: "1h"
    timeout_action: alert_human
    transitions:
      done: quick_review

  - id: quick_review
    name: "Quick Review"
    type: agent
    assigned_role: reviewer
    description: "Expedited code review focused on correctness and safety"
    inputs:
      - from_step: hotfix
        type: branch
    review:
      reviewers_roles: ["reviewer"]
      min_approvals: 1
      on_reject: revise
      on_reject_max_rounds: 1
    transitions:
      approved: human_merge
      rejected: hotfix

  - id: human_merge
    name: "Human Merge Approval"
    type: human_gate
    gate: merge
    description: "Human approves the hotfix merge"
    transitions:
      approved: deploy_hotfix
      rejected: hotfix

  - id: deploy_hotfix
    name: "Deploy Hotfix"
    type: agent
    assigned_role: devops
    description: "Deploy hotfix directly to production"
    outputs:
      - type: deployment
        environment: production
    transitions:
      done: verify

  - id: verify
    name: "Verify"
    type: agent
    assigned_role: devops
    description: "Verify the hotfix resolved the incident and systems are healthy"
    expected_duration: "10m"
    timeout: "20m"
    timeout_action: alert_human
    transitions:
      done: complete
      failed: investigate

  - id: complete
    name: "Complete"
    type: terminal
    description: "Incident resolved"
    terminal: true
    actions:
      - move_task_to: done
      - notify: ["founder"]
