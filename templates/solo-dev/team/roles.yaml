roles:
  owner:
    description: "Full access — company owner"
    permissions: ["*"]

  admin:
    description: "Manage users, approve tasks, view secrets"
    permissions:
      - tasks.*
      - agents.*
      - knowledge.*
      - chat.*
      - dashboard.*
      - secrets.read
      - team.read
      - team.invite
      - integrations.*
      - workflows.read
      - audit.read

  member:
    description: "Work on tasks, chat, read knowledge"
    permissions:
      - tasks.read
      - tasks.create
      - tasks.update
      - agents.read
      - chat.*
      - knowledge.read
      - knowledge.write
      - dashboard.read
      - integrations.read
      - team.read

  viewer:
    description: "Read-only access"
    permissions:
      - tasks.read
      - agents.read
      - dashboard.read
      - knowledge.read
      - team.read
