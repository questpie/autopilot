id: development
name: "Development Workflow"
version: 1
description: "Full development lifecycle from scoping to deployment and announcement"

steps:
  - id: scope
    name: "Scope"
    type: agent
    assigned_role: strategist
    description: "Analyze requirements and write feature spec"
    outputs:
      - type: document
        path_template: "/projects/{{project}}/docs/spec-{{task_id}}.md"
        description: "Feature specification"
    transitions:
      done: plan

  - id: plan
    name: "Plan"
    type: agent
    assigned_role: planner
    description: "Create detailed implementation plan from spec"
    inputs:
      - from_step: scope
        type: document
    outputs:
      - type: document
        path_template: "/projects/{{project}}/docs/plan-{{task_id}}.md"
        description: "Implementation plan"
    transitions:
      done: plan_review

  - id: plan_review
    name: "Plan Review"
    type: agent
    assigned_role: reviewer
    description: "Review the implementation plan for completeness and correctness"
    inputs:
      - from_step: plan
        type: document
    review:
      reviewers_roles: ["reviewer"]
      min_approvals: 1
      on_reject: revise
      on_reject_max_rounds: 2
    transitions:
      approved: implement
      rejected: plan

  - id: implement
    name: "Implement"
    type: agent
    assigned_role: developer
    description: "Write code, create branch, push commits"
    inputs:
      - from_step: plan
        type: document
    outputs:
      - type: branch
        name_template: "feat/{{task_id}}"
        description: "Feature branch with implementation"
    expected_duration: "4h"
    timeout: "8h"
    timeout_action: alert_human
    transitions:
      done: code_review

  - id: code_review
    name: "Code Review"
    type: agent
    assigned_role: reviewer
    description: "Review code quality, architecture, and test coverage"
    inputs:
      - from_step: implement
        type: branch
    review:
      reviewers_roles: ["reviewer"]
      min_approvals: 1
      on_reject: revise
      on_reject_max_rounds: 3
    transitions:
      approved: human_merge
      rejected: implement

  - id: human_merge
    name: "Human Merge Approval"
    type: human_gate
    gate: merge
    description: "Human reviews and approves the merge request"
    transitions:
      approved: deploy_staging
      rejected: implement

  - id: deploy_staging
    name: "Deploy to Staging"
    type: agent
    assigned_role: devops
    description: "Deploy the feature branch to staging environment"
    outputs:
      - type: deployment
        environment: staging
    transitions:
      done: verify

  - id: verify
    name: "Verify Staging"
    type: agent
    assigned_role: devops
    description: "Run smoke tests and verify deployment on staging"
    expected_duration: "15m"
    timeout: "30m"
    timeout_action: alert_human
    transitions:
      done: human_deploy_prod
      failed: deploy_staging

  - id: human_deploy_prod
    name: "Human Production Deploy Approval"
    type: human_gate
    gate: deploy
    description: "Human approves production deployment"
    transitions:
      approved: deploy_prod
      rejected: verify

  - id: deploy_prod
    name: "Deploy to Production"
    type: agent
    assigned_role: devops
    description: "Deploy to production environment"
    outputs:
      - type: deployment
        environment: production
    transitions:
      done: announce

  - id: announce
    name: "Announce"
    type: agent
    assigned_role: marketing
    description: "Write release notes and announce the feature"
    inputs:
      - from_step: scope
        type: document
    outputs:
      - type: document
        path_template: "/projects/{{project}}/marketing/release-{{task_id}}.md"
        description: "Release announcement"
    transitions:
      done: complete

  - id: complete
    name: "Complete"
    type: terminal
    description: "Workflow complete — task is done"
    terminal: true
    actions:
      - move_task_to: done
