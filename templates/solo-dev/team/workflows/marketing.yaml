id: marketing
name: "Marketing Workflow"
version: 1
description: "Content creation and publishing workflow for marketing campaigns"

steps:
  - id: brief
    name: "Brief"
    type: agent
    executor:
      kind: agent
      role: strategist
      model_policy: smart-plan
    assigned_role: strategist
    description: "Define campaign goals, target audience, and key messages"
    validate:
      mode: auto
      rules:
        - type: output_exists
          target: marketing_brief
    outputs:
      - type: document
        path_template: "/projects/{{project}}/marketing/brief-{{task_id}}.md"
        description: "Marketing brief"
    transitions:
      done: content_creation

  - id: content_creation
    name: "Content Creation"
    type: agent
    executor:
      kind: agent
      role: marketing
      model_policy: cheap-execute
    assigned_role: marketing
    description: "Write copy, blog posts, social media content"
    inputs:
      - from_step: brief
        type: document
    outputs:
      - type: document
        path_template: "/projects/{{project}}/marketing/content-{{task_id}}.md"
        description: "Marketing content"
    validate:
      mode: auto
      rules:
        - type: output_exists
          target: marketing_content
    transitions:
      done: design_assets

  - id: design_assets
    name: "Design Assets"
    type: agent
    executor:
      kind: agent
      role: design
      model_policy: smart-review
    assigned_role: design
    description: "Create visual assets, graphics, and mockups for the campaign"
    inputs:
      - from_step: content_creation
        type: document
    outputs:
      - type: document
        path_template: "/projects/{{project}}/design/assets-{{task_id}}.md"
        description: "Design assets and specifications"
    validate:
      mode: auto
      rules:
        - type: output_exists
          target: design_assets
    transitions:
      done: human_review

  - id: human_review
    name: "Human Review"
    type: human_gate
    executor:
      kind: human
      gate: publish
    gate: publish
    description: "Human reviews content and design before publishing"
    validate:
      mode: human
      gate: publish
    transitions:
      approved: publish
      rejected: content_creation

  - id: publish
    name: "Publish"
    type: agent
    executor:
      kind: agent
      role: marketing
      model_policy: cheap-execute
    assigned_role: marketing
    description: "Publish content to target channels and platforms"
    transitions:
      done: monitor

  - id: monitor
    name: "Monitor"
    type: agent
    executor:
      kind: agent
      role: marketing
      model_policy: cheap-research
    assigned_role: marketing
    description: "Track engagement metrics and campaign performance"
    expected_duration: "24h"
    validate:
      mode: auto
      rules:
        - type: metrics_captured
    transitions:
      done: complete

  - id: complete
    name: "Complete"
    type: terminal
    description: "Marketing workflow complete"
    terminal: true
    actions:
      - move_task_to: done
